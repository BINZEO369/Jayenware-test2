<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Categories | JAYENWARE Admin</title>
    <meta name="theme-color" content="#06b6d4">
    <link rel="icon" type="image/png" href="https://ozuwazkqyrxiwwfjceth.supabase.co/storage/v1/object/public/images/Beige%20Black%20Minimal%20Simple%20Modern%20Handwritten%20Graffiti%20Typographic%20Arts%20and_20251212_154142_0000.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.5);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.1);
            --radius-xl: 1.5rem;
            --radius-2xl: 2rem;
            --radius-3xl: 2.5rem;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            transition: background 0.3s, color 0.3s;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        body.dark {
            background: #0a0a0a;
            color: #f5f5f7;
        }

        body.dark .glass-card {
            background: rgba(28, 28, 30, 0.8);
            border-color: rgba(255, 255, 255, 0.08);
        }

        body.dark .bg-white {
            background: #1c1c1e;
        }

        body.dark .bg-gray-50,
        body.dark .bg-gray-100 {
            background: #2c2c2e;
        }

        body.dark .text-slate-800,
        body.dark .text-slate-900 {
            color: #f5f5f7;
        }

        body.dark .text-gray-400 {
            color: #8e8e93;
        }

        body.dark .text-gray-500 {
            color: #636366;
        }

        body.dark .border,
        body.dark .border-b {
            border-color: #2c2c2e;
        }

        body.dark input {
            background: #1c1c1e;
            border-color: #2c2c2e;
            color: #fff;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-md);
        }

        .custom-scroll::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scroll::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #06b6d4, #3b82f6);
            border-radius: 10px;
        }

        .btn-action {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
        }

        .btn-action:hover {
            transform: translateY(-2px);
        }

        .btn-action:active {
            transform: scale(0.96);
        }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes slideDown {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(100px); opacity: 0; }
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes iconBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .toast-enter {
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .toast-exit {
            animation: slideDown 0.3s ease-in forwards;
        }

        .category-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .category-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(6, 182, 212, 0.15);
        }

        .category-card:hover .category-icon {
            animation: iconBounce 0.6s ease-in-out;
        }

        .category-card .card-gradient {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.4s ease;
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.05), rgba(59, 130, 246, 0.08));
            background-size: 200% 200%;
            animation: gradientShift 4s ease infinite;
        }

        .category-card:hover .card-gradient {
            opacity: 1;
        }

        .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .product-count-badge {
            background: linear-gradient(135deg, #06b6d4, #3b82f6);
            color: white;
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 10px;
            font-weight: 800;
        }

        @media (max-width: 768px) {
            .bottom-nav {
                display: flex;
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                z-index: 100;
                background: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(20px);
                border-top: 1px solid rgba(0, 0, 0, 0.08);
                padding: 8px 0 env(safe-area-inset-bottom, 8px) 0;
            }
            body.dark .bottom-nav {
                background: rgba(28, 28, 30, 0.95);
                border-color: rgba(255, 255, 255, 0.08);
            }
            main {
                padding-bottom: 100px !important;
            }
        }

        @media (min-width: 769px) {
            .bottom-nav {
                display: none;
            }
        }
    </style>
</head>
<body class="text-slate-800 antialiased">
    <!-- GLOBAL LOADER -->
    <div id="global-loader" style="position:fixed;inset:0;background:white;z-index:9999;display:flex;justify-content:center;align-items:center;transition:opacity 0.5s;">
        <div class="flex flex-col items-center">
            <div class="w-14 h-14 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-5 font-bold text-gray-400 text-sm">Loading Categories...</p>
        </div>
    </div>

    <!-- MAIN LAYOUT -->
    <div id="main-layout" class="hidden min-h-screen">
        <main class="p-4 md:p-8 lg:p-10 max-w-7xl mx-auto">
            <!-- HEADER -->
            <header class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div>
                    <div class="flex items-center gap-2 text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">
                        <a href="/home" class="hover:text-blue-600 transition"><i class="fa-solid fa-house"></i> Home</a>
                        <i class="fa-solid fa-chevron-right text-[8px]"></i>
                        <span class="text-cyan-600">Categories</span>
                    </div>
                    <h2 class="text-2xl md:text-3xl font-black uppercase tracking-tight">Product Categories</h2>
                    <p class="text-[10px] font-bold text-gray-400 uppercase mt-1">Organize your inventory</p>
                </div>
            </header>

            <!-- ADD CATEGORY FORM -->
            <div class="glass-card p-6 md:p-8 rounded-[3rem] shadow-sm mb-8">
                <div class="flex flex-col md:flex-row gap-4 items-end">
                    <div class="flex-grow">
                        <label class="text-[10px] font-black text-gray-400 uppercase ml-2 mb-1 block">
                            <i class="fa-solid fa-folder-plus mr-1"></i> Category Name
                        </label>
                        <input type="text" id="category-name" placeholder="e.g. T-Shirts, Jeans, Sneakers..." 
                               class="w-full p-4 bg-gray-50 border rounded-2xl outline-none font-bold focus:ring-2 focus:ring-cyan-500 transition text-sm"
                               onkeyup="if(event.key==='Enter') saveCategory()">
                    </div>
                    <button id="btn-category-save" onclick="saveCategory()" 
                            class="px-8 py-4 bg-gradient-to-r from-cyan-500 to-blue-600 text-white rounded-2xl font-black text-xs uppercase btn-action shadow-lg whitespace-nowrap">
                        <i class="fa-solid fa-plus mr-2"></i> Add Category
                    </button>
                </div>
            </div>

            <!-- CATEGORIES GRID -->
            <div id="categories-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                <div class="col-span-full text-center py-16 text-xs text-gray-400">
                    <i class="fa-solid fa-folder-open text-5xl mb-4 block opacity-20"></i>
                    <p class="font-bold">No categories yet</p>
                    <p class="mt-1">Add your first category above</p>
                </div>
            </div>

            <!-- EMPTY STATE WITH QUICK ADD -->
            <div id="quick-add-section" class="hidden mt-8">
                <div class="glass-card p-6 md:p-8 rounded-[3rem] shadow-sm text-center">
                    <i class="fa-solid fa-lightbulb text-3xl text-yellow-400 mb-3"></i>
                    <h3 class="font-black uppercase text-sm mb-2">Quick Add Popular Categories</h3>
                    <p class="text-[10px] text-gray-400 mb-4">Click to instantly add these common categories</p>
                    <div class="flex flex-wrap justify-center gap-2" id="quick-add-buttons">
                        <!-- Filled dynamically -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- EDIT MODAL -->
    <div id="edit-modal" class="hidden fixed inset-0 z-[500] bg-black/40 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] p-6 md:p-8 max-w-md w-full shadow-2xl">
            <h3 class="text-lg font-black uppercase mb-6 flex items-center gap-2">
                <i class="fa-solid fa-pen text-cyan-600"></i> Edit Category
            </h3>
            <input type="text" id="edit-category-name" placeholder="Category Name" 
                   class="w-full p-4 bg-gray-50 border rounded-2xl outline-none font-bold focus:ring-2 focus:ring-cyan-500 mb-4 text-sm"
                   onkeyup="if(event.key==='Enter') updateCategory()">
            <div class="flex gap-3">
                <button onclick="closeEditModal()" class="flex-1 py-3 bg-gray-100 rounded-xl font-black text-xs uppercase btn-action">Cancel</button>
                <button onclick="updateCategory()" class="flex-1 py-3 bg-gradient-to-r from-cyan-500 to-blue-600 text-white rounded-xl font-black text-xs uppercase btn-action">Update</button>
            </div>
        </div>
    </div>

    <!-- DELETE CONFIRMATION MODAL -->
    <div id="delete-modal" class="hidden fixed inset-0 z-[500] bg-black/40 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] p-6 md:p-8 max-w-md w-full shadow-2xl">
            <h3 class="text-lg font-black uppercase mb-4 flex items-center gap-2 text-red-600">
                <i class="fa-solid fa-triangle-exclamation"></i> Delete Category
            </h3>
            <p class="text-sm text-gray-600 mb-2" id="delete-modal-message"></p>
            <p class="text-[10px] text-red-500 font-bold mb-6" id="delete-modal-warning"></p>
            <div class="flex gap-3">
                <button onclick="closeDeleteModal()" class="flex-1 py-3 bg-gray-100 rounded-xl font-black text-xs uppercase btn-action">Cancel</button>
                <button id="delete-confirm-btn" class="flex-1 py-3 bg-red-500 text-white rounded-xl font-black text-xs uppercase btn-action">Delete</button>
            </div>
        </div>
    </div>

    <!-- BOTTOM NAVIGATION (MOBILE) -->
    <nav class="bottom-nav hidden">
        <div class="flex justify-around items-center px-2">
            <a href="/home" class="flex flex-col items-center gap-1 p-2 text-[10px] font-black text-gray-400 no-underline">
                <i class="fa-solid fa-house text-lg"></i> Home
            </a>
            <a href="/products" class="flex flex-col items-center gap-1 p-2 text-[10px] font-black text-gray-400 no-underline">
                <i class="fa-solid fa-box text-lg"></i> Products
            </a>
            <a href="/categories" class="flex flex-col items-center gap-1 p-2 text-[10px] font-black text-cyan-600 no-underline">
                <i class="fa-solid fa-list text-lg"></i> Categories
            </a>
            <a href="/promo" class="flex flex-col items-center gap-1 p-2 text-[10px] font-black text-gray-400 no-underline">
                <i class="fa-solid fa-ticket text-lg"></i> Promo
            </a>
            <a href="/orders" class="flex flex-col items-center gap-1 p-2 text-[10px] font-black text-gray-400 no-underline">
                <i class="fa-solid fa-cart-shopping text-lg"></i> Orders
            </a>
        </div>
    </nav>

    <script>
        // ==================== CONFIGURATION ====================
const SUPABASE_URL = "https://tvqnanpfwzzvjmhdxkfz.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR2cW5hbnBmd3p6dmptaGR4a2Z6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMDY1OTcsImV4cCI6MjA5NDg4MjU5N30.jZ-SbnVDpek-Ep83rzsmth3ERyN6NatSIjd2NszEf8E";
        const ADMIN_EMAIL = "binzeo369@gmail.com";
        const LOGO_URL = "https://jayenware.shop/logo.png";
const HOME_URL = "/home";
const LOGIN_URL = "/login";


        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ==================== STATE ====================
        let allCategories = [];
        let allProducts = [];
        let isDarkMode = false;
        let editingCategoryId = null;
        let deleteTargetId = null;

        // Predefined category colors
        const categoryColors = [
            '#06b6d4', '#3b82f6', '#8b5cf6', '#ec4899', '#f59e0b', 
            '#22c55e', '#ef4444', '#6366f1', '#14b8a6', '#f97316'
        ];

        const categoryIcons = [
            'fa-shirt', 'fa-shoe-prints', 'fa-mobile-screen', 'fa-laptop', 'fa-couch',
            'fa-utensils', 'fa-book', 'fa-gem', 'fa-gamepad', 'fa-basket-shopping'
        ];

        // Popular categories for quick add
        const popularCategories = [
            'T-Shirts', 'Jeans', 'Shoes', 'Bags', 'Watches', 
            'Sunglasses', 'Hoodies', 'Jackets', 'Dresses', 'Accessories'
        ];

        // ==================== UTILITY ====================
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-20 md:bottom-6 right-4 md:right-6 px-5 py-3.5 rounded-2xl font-black text-sm text-white shadow-2xl z-[9999] toast-enter ${
                type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500'
            }`;
            toast.innerHTML = `<span class="flex items-center gap-2"><i class="fa-solid fa-${
                type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'
            }"></i> ${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => { toast.classList.add('toast-exit'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function getCategoryColor(index) {
            return categoryColors[index % categoryColors.length];
        }

        function getCategoryIcon(index) {
            return categoryIcons[index % categoryIcons.length];
        }

        function getProductCount(categoryName) {
            return allProducts.filter(p => p.category === categoryName).length;
        }

        // ==================== LOAD DATA ====================
        async function loadData() {
            try {
                const [{ data: categories }, { data: products }] = await Promise.all([
                    _supabase.from('categories').select('*').order('created_at', { ascending: true }),
                    _supabase.from('products').select('*')
                ]);

                if (categories) allCategories = categories;
                if (products) allProducts = products;

                renderAll();
            } catch (error) {
                console.error('Error loading data:', error);
                showToast('Failed to load categories', 'error');
            }
        }

        function renderAll() {
            renderCategories();
            renderQuickAdd();
        }

        // ==================== SAVE CATEGORY ====================
        async function saveCategory() {
            const name = document.getElementById('category-name').value.trim();
            if (!name) {
                showToast('Please enter a category name', 'error');
                document.getElementById('category-name').focus();
                return;
            }

            // Check duplicate
            const exists = allCategories.find(c => c.name.toLowerCase() === name.toLowerCase());
            if (exists) {
                showToast('This category already exists!', 'error');
                return;
            }

            const btn = document.getElementById('btn-category-save');
            btn.disabled = true;
            btn.innerHTML = '<div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin mx-auto"></div>';

            try {
                const { error } = await _supabase.from('categories').insert([{ name }]);
                if (error) throw error;

                showToast('Category added! 🎉', 'success');
                document.getElementById('category-name').value = '';
                document.getElementById('category-name').focus();
                await loadData();
            } catch (error) {
                console.error('Error saving category:', error);
                showToast('Failed to add category', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-plus mr-2"></i> Add Category';
            }
        }

        // ==================== RENDER CATEGORIES ====================
        function renderCategories() {
            const grid = document.getElementById('categories-grid');

            if (allCategories.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-16 text-xs text-gray-400">
                        <i class="fa-solid fa-folder-open text-5xl mb-4 block opacity-20"></i>
                        <p class="font-bold">No categories yet</p>
                        <p class="mt-1">Add your first category above</p>
                    </div>`;
                return;
            }

            grid.innerHTML = allCategories.map((cat, index) => {
                const productCount = getProductCount(cat.name);
                const color = getCategoryColor(index);
                const icon = getCategoryIcon(index);
                const createdDate = cat.created_at ? new Date(cat.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) : 'N/A';

                return `
                    <div class="category-card bg-white rounded-[2.5rem] border shadow-sm p-6 relative z-10">
                        <div class="card-gradient rounded-[2.5rem]"></div>
                        
                        <div class="relative z-10">
                            <!-- Color dot and icon -->
                            <div class="flex items-center gap-3 mb-4">
                                <div class="w-12 h-12 rounded-2xl flex items-center justify-center text-white text-lg category-icon shadow-lg"
                                     style="background: ${color}">
                                    <i class="fa-solid ${icon}"></i>
                                </div>
                                <div>
                                    <h3 class="font-black text-sm uppercase truncate max-w-[150px]">${cat.name}</h3>
                                    <p class="text-[9px] text-gray-400">${createdDate}</p>
                                </div>
                            </div>

                            <!-- Product count -->
                            <div class="flex items-center justify-between mb-4">
                                <span class="product-count-badge">
                                    <i class="fa-solid fa-box mr-1"></i> ${productCount} products
                                </span>
                            </div>

                            <!-- Progress bar -->
                            <div class="w-full bg-gray-100 rounded-full h-2 mb-4 overflow-hidden">
                                <div class="h-2 rounded-full transition-all duration-700" 
                                     style="width: ${Math.min((productCount / Math.max(...allCategories.map(c => getProductCount(c.name)), 1)) * 100, 100)}%; background: ${color}">
                                </div>
                            </div>

                            <!-- Actions -->
                            <div class="flex gap-2 pt-3 border-t">
                                <button onclick="openEditModal(${cat.id}, '${cat.name.replace(/'/g, "\\'")}')" 
                                        class="flex-1 py-2.5 bg-cyan-50 text-cyan-600 rounded-xl text-[10px] font-black btn-action hover:bg-cyan-100">
                                    <i class="fa-solid fa-pen mr-1"></i> Edit
                                </button>
                                <button onclick="openDeleteModal(${cat.id}, '${cat.name.replace(/'/g, "\\'")}', ${productCount})" 
                                        class="flex-1 py-2.5 bg-red-50 text-red-500 rounded-xl text-[10px] font-black btn-action hover:bg-red-100">
                                    <i class="fa-solid fa-trash mr-1"></i> Delete
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ==================== QUICK ADD ====================
        function renderQuickAdd() {
            const section = document.getElementById('quick-add-section');
            const existingNames = allCategories.map(c => c.name.toLowerCase());
            const availableQuick = popularCategories.filter(name => !existingNames.includes(name.toLowerCase()));

            if (allCategories.length === 0 || availableQuick.length > 0) {
                section.classList.remove('hidden');
            } else {
                section.classList.add('hidden');
                return;
            }

            document.getElementById('quick-add-buttons').innerHTML = availableQuick.map((name, i) => `
                <button onclick="quickAddCategory('${name}')" 
                        class="px-4 py-2.5 rounded-xl text-[10px] font-black btn-action border hover:shadow-md transition"
                        style="border-color: ${getCategoryColor(i)}; color: ${getCategoryColor(i)}">
                    <i class="fa-solid fa-plus mr-1"></i> ${name}
                </button>
            `).join('');
        }

        async function quickAddCategory(name) {
            document.getElementById('category-name').value = name;
            await saveCategory();
        }

        // ==================== EDIT ====================
        function openEditModal(catId, catName) {
            editingCategoryId = catId;
            document.getElementById('edit-category-name').value = catName;
            document.getElementById('edit-modal').classList.remove('hidden');
            setTimeout(() => document.getElementById('edit-category-name').focus(), 100);
        }

        function closeEditModal() {
            document.getElementById('edit-modal').classList.add('hidden');
            editingCategoryId = null;
        }

        async function updateCategory() {
            const newName = document.getElementById('edit-category-name').value.trim();
            if (!newName) { showToast('Category name is required', 'error'); return; }

            // Check duplicate (excluding current)
            const exists = allCategories.find(c => c.name.toLowerCase() === newName.toLowerCase() && c.id !== editingCategoryId);
            if (exists) { showToast('This category name already exists!', 'error'); return; }

            try {
                const { error } = await _supabase.from('categories').update({ name: newName }).eq('id', editingCategoryId);
                if (error) throw error;

                // Also update products with old category name
                const oldCategory = allCategories.find(c => c.id === editingCategoryId);
                if (oldCategory && oldCategory.name !== newName) {
                    await _supabase.from('products').update({ category: newName }).eq('category', oldCategory.name);
                }

                showToast('Category updated!', 'success');
                closeEditModal();
                await loadData();
            } catch (error) {
                console.error('Error updating category:', error);
                showToast('Failed to update category', 'error');
            }
        }

        // ==================== DELETE ====================
        function openDeleteModal(catId, catName, productCount) {
            deleteTargetId = catId;
            document.getElementById('delete-modal-message').textContent = 
                `Are you sure you want to delete "${catName}"?`;
            document.getElementById('delete-modal-warning').textContent = 
                productCount > 0 ? `⚠️ This category has ${productCount} products. They will become "Uncategorized".` : '';
            document.getElementById('delete-confirm-btn').onclick = confirmDelete;
            document.getElementById('delete-modal').classList.remove('hidden');
        }

        function closeDeleteModal() {
            document.getElementById('delete-modal').classList.add('hidden');
            deleteTargetId = null;
        }

        async function confirmDelete() {
            if (!deleteTargetId) return;
            try {
                const category = allCategories.find(c => c.id === deleteTargetId);
                
                // Set products to uncategorized
                if (category) {
                    await _supabase.from('products').update({ category: 'Uncategorized' }).eq('category', category.name);
                }

                const { error } = await _supabase.from('categories').delete().eq('id', deleteTargetId);
                if (error) throw error;

                showToast('Category deleted', 'error');
                closeDeleteModal();
                await loadData();
            } catch (error) {
                console.error('Error deleting category:', error);
                showToast('Failed to delete category', 'error');
            }
        }

        // ==================== SESSION CHECK ====================
        async function checkSession() {
            const { data: { session } } = await _supabase.auth.getSession();

            if (!session || session.user.email !== ADMIN_EMAIL) {
                window.location.href = LOGIN_URL;
                return;
            }

            document.getElementById('global-loader').style.display = 'none';
            document.getElementById('main-layout').classList.remove('hidden');

            if (localStorage.getItem('darkMode') === 'true') {
                isDarkMode = true;
                document.body.classList.add('dark');
            }

            if (window.innerWidth < 769) {
                document.querySelector('.bottom-nav').classList.remove('hidden');
            }

            await loadData();
            document.getElementById('category-name').focus();
        }

        // ==================== KEYBOARD SHORTCUTS ====================
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeEditModal();
                closeDeleteModal();
            }
        });

        // ==================== INIT ====================
        window.onload = checkSession;

        window.addEventListener('resize', () => {
            if (window.innerWidth >= 769) {
                document.querySelector('.bottom-nav').classList.add('hidden');
            } else {
                document.querySelector('.bottom-nav').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
