<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JAYENWARE | Analytics Dashboard by BINZEO</title>
    <meta name="theme-color" content="#0071e3">
    <link rel="icon" href="https://ozuwazkqyrxiwwfjceth.supabase.co/storage/v1/object/public/images/Beige%20Black%20Minimal%20Simple%20Modern%20Handwritten%20Graffiti%20Typographic%20Arts%20and_20251212_154142_0000.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.5);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.1);
            --radius-xl: 1.5rem;
            --radius-2xl: 2rem;
            --radius-3xl: 2.5rem;
        }

        * {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            transition: background 0.3s, color 0.3s;
        }

        body.dark {
            background: #0a0a0a;
            color: #f5f5f7;
        }

        body.dark .glass-card {
            background: rgba(28, 28, 30, 0.8);
            border-color: rgba(255, 255, 255, 0.08);
        }

        body.dark input,
        body.dark select,
        body.dark textarea {
            background: #1c1c1e;
            border-color: #2c2c2e;
            color: #fff;
        }

        body.dark .bg-white {
            background: #1c1c1e;
        }

        body.dark .text-slate-800,
        body.dark .text-slate-900 {
            color: #f5f5f7;
        }

        body.dark .text-gray-400 {
            color: #8e8e93;
        }

        body.dark .text-gray-500 {
            color: #636366;
        }

        body.dark .bg-gray-50,
        body.dark .bg-slate-50 {
            background: #2c2c2e;
        }

        body.dark .border {
            border-color: #2c2c2e;
        }

        body.dark .border-b {
            border-color: #2c2c2e;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-md);
        }

        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scroll::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #0071e3, #5856d6);
            border-radius: 10px;
        }

        .btn-action {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .btn-action:hover {
            transform: translateY(-2px);
        }

        .btn-action:active {
            transform: scale(0.96);
        }

        .skeleton {
            background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 12px;
        }

        body.dark .skeleton {
            background: linear-gradient(90deg, #2c2c2e 25%, #3a3a3c 50%, #2c2c2e 75%);
            background-size: 200% 100%;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }

        .toast-enter {
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .toast-exit {
            animation: slideDown 0.3s ease-in forwards;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes slideDown {
            from {
                transform: translateY(0);
                opacity: 1;
            }
            to {
                transform: translateY(100px);
                opacity: 0;
            }
        }

        .sparkline-canvas {
            width: 100%;
            height: 40px;
        }

        .chart-container {
            position: relative;
            height: 320px;
            width: 100%;
        }

        .nav-back {
            transition: all 0.3s ease;
        }

        .nav-back:hover {
            transform: translateX(-3px);
        }

        @media (max-width: 768px) {
            .chart-container {
                height: 250px;
            }
        }
    </style>
</head>
<body class="text-slate-800 antialiased">
    <!-- GLOBAL LOADER -->
    <div id="global-loader" style="position:fixed;inset:0;background:white;z-index:9999;display:flex;justify-content:center;align-items:center;transition:opacity 0.5s;">
        <div class="flex flex-col items-center">
            <div class="w-14 h-14 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-5 font-bold text-gray-400 text-sm">Loading Analytics...</p>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div id="main-content" class="min-h-screen p-4 md:p-8 lg:p-10">
        <!-- Back Navigation -->
        <div class="mb-6">
            <a href="index.html" class="nav-back inline-flex items-center gap-2 px-4 py-2.5 bg-white rounded-2xl shadow-sm hover:shadow-md transition text-sm font-bold text-gray-600">
                <i class="fa-solid fa-arrow-left"></i>
                <span>Back to Dashboard</span>
            </a>
        </div>

        <!-- HEADER -->
        <header class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <div class="flex items-center gap-2 text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">
                    <span>Dashboard</span>
                    <i class="fa-solid fa-chevron-right text-[8px]"></i>
                    <span class="text-blue-600">Analytics</span>
                </div>
                <h2 class="text-2xl md:text-3xl font-black uppercase tracking-tight">Platform Analytics</h2>
            </div>
            <div class="flex items-center gap-3 w-full md:w-auto">
                <div class="text-right hidden lg:block">
                    <p class="text-[10px] font-black text-blue-600 uppercase">Live Server</p>
                    <p class="text-xs font-bold text-green-500 flex items-center justify-end gap-1">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Operational
                    </p>
                </div>
                <button onclick="toggleDarkMode()" class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-blue-700 text-white flex items-center justify-center font-black shadow-lg btn-action">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </div>
        </header>

        <!-- Time Filter + Weekly Report Download -->
        <div class="flex flex-wrap items-center gap-2 mb-6">
            <div class="flex bg-gray-100 rounded-2xl p-1">
                <button onclick="setTimeFilter('7d', this)" class="px-5 py-2.5 rounded-xl text-[10px] font-black uppercase transition bg-white shadow-sm">7 Days</button>
                <button onclick="setTimeFilter('30d', this)" class="px-5 py-2.5 rounded-xl text-[10px] font-black uppercase transition text-gray-500">30 Days</button>
                <button onclick="setTimeFilter('1y', this)" class="px-5 py-2.5 rounded-xl text-[10px] font-black uppercase transition text-gray-500">Year</button>
            </div>
            <button onclick="downloadWeeklyReport()" class="px-5 py-2.5 bg-green-600 text-white rounded-xl font-black text-xs uppercase btn-action flex items-center gap-2 shadow-lg hover:bg-green-700">
                <i class="fa-solid fa-file-pdf"></i> Download Weekly Report
            </button>
        </div>

        <!-- Stat Cards with Sparklines -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="glass-card p-6 rounded-[2rem] shadow-sm hover:shadow-lg transition">
                <div class="flex justify-between items-start mb-2">
                    <div class="p-3 bg-blue-50 text-blue-600 rounded-2xl"><i class="fa-solid fa-sack-dollar text-lg"></i></div>
                    <span id="trend-revenue" class="text-[10px] font-black px-2.5 py-1 rounded-lg bg-green-100 text-green-600">+12.5% ↑</span>
                </div>
                <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Total Revenue</p>
                <h3 id="stat-revenue" class="text-2xl md:text-3xl font-black mb-2">৳ 0</h3>
                <canvas id="spark-revenue" class="sparkline-canvas"></canvas>
            </div>
            <div class="glass-card p-6 rounded-[2rem] shadow-sm hover:shadow-lg transition">
                <div class="flex justify-between items-start mb-2">
                    <div class="p-3 bg-orange-50 text-orange-600 rounded-2xl"><i class="fa-solid fa-cart-arrow-down text-lg"></i></div>
                    <span id="trend-orders" class="text-[10px] font-black px-2.5 py-1 rounded-lg bg-blue-100 text-blue-600">+8.2% ↑</span>
                </div>
                <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Total Orders</p>
                <h3 id="stat-orders" class="text-2xl md:text-3xl font-black mb-2">0</h3>
                <canvas id="spark-orders" class="sparkline-canvas"></canvas>
            </div>
            <div class="glass-card p-6 rounded-[2rem] shadow-sm hover:shadow-lg transition">
                <div class="flex justify-between items-start mb-2">
                    <div class="p-3 bg-purple-50 text-purple-600 rounded-2xl"><i class="fa-solid fa-spinner text-lg"></i></div>
                    <span id="trend-pending" class="text-[10px] font-black px-2.5 py-1 rounded-lg bg-yellow-100 text-yellow-600">-3.1% ↓</span>
                </div>
                <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Pending Orders</p>
                <h3 id="stat-pending" class="text-2xl md:text-3xl font-black mb-2">0</h3>
                <canvas id="spark-pending" class="sparkline-canvas"></canvas>
            </div>
            <div class="glass-card p-6 rounded-[2rem] shadow-sm hover:shadow-lg transition">
                <div class="flex justify-between items-start mb-2">
                    <div class="p-3 bg-green-50 text-green-600 rounded-2xl"><i class="fa-solid fa-chart-line text-lg"></i></div>
                    <span id="trend-aov" class="text-[10px] font-black px-2.5 py-1 rounded-lg bg-green-100 text-green-600">+5.7% ↑</span>
                </div>
                <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Avg. Order Value</p>
                <h3 id="stat-aov" class="text-2xl md:text-3xl font-black mb-2">৳ 0</h3>
                <canvas id="spark-aov" class="sparkline-canvas"></canvas>
            </div>
        </div>

        <!-- Charts -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 glass-card p-6 md:p-8 rounded-[2.5rem] shadow-sm">
                <div class="flex justify-between items-center mb-6">
                    <h4 class="text-sm font-black uppercase flex items-center gap-2"><i class="fa-solid fa-wave-square text-blue-600"></i> Sales Performance</h4>
                    <div class="flex gap-2">
                        <button class="text-[10px] font-black px-3 py-1.5 bg-blue-100 text-blue-600 rounded-lg">Daily</button>
                        <button class="text-[10px] font-black px-3 py-1.5 text-gray-400 hover:bg-gray-100 rounded-lg">Weekly</button>
                    </div>
                </div>
                <div class="chart-container"><canvas id="revenueChart"></canvas></div>
            </div>
            <div class="glass-card p-6 md:p-8 rounded-[2.5rem] shadow-sm">
                <h4 class="text-sm font-black uppercase mb-6 flex items-center gap-2"><i class="fa-solid fa-pie-chart text-orange-600"></i> Categories</h4>
                <div class="chart-container flex justify-center items-center" style="height:250px"><canvas id="categoryChart"></canvas></div>
                <div id="category-legend" class="mt-4 space-y-1.5"></div>
            </div>
        </div>
    </div>

    <script>
        // ==================== SUPABASE CONFIGURATION ====================
        const SUPABASE_URL = "https://vdqbjwzixppbtkbgvhlq.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkcWJqd3ppeHBwYnRrYmd2aGxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMDc3MzQsImV4cCI6MjA5MzU4MzczNH0.E6C0_7SWIrTMJlFe5t8EbNAW5fzlpg-fKV3ZV0XYd3k";
        const LOGO_URL = "https://ozuwazkqyrxiwwfjceth.supabase.co/storage/v1/object/public/images/Beige%20Black%20Minimal%20Simple%20Modern%20Handwritten%20Graffiti%20Typographic%20Arts%20and_20251212_154142_0000.png";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ==================== GLOBAL STATE ====================
        let currentData = {
            products: [],
            orders: []
        };
        let revChartInstance = null;
        let catChartInstance = null;
        let sparkInstances = {};
        let currentTimeFilter = '7d';
        let isDarkMode = false;

        // ==================== UTILITY FUNCTIONS ====================
        function triggerLoader(ms = 1000) {
            const loader = document.getElementById('global-loader');
            loader.style.opacity = '1';
            loader.style.display = 'flex';
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, ms);
        }

        function showToast(message, type = 'success') {
            const existingToast = document.querySelector('.toast-enter');
            if (existingToast) existingToast.remove();

            const toast = document.createElement('div');
            toast.className =
                `fixed bottom-6 right-4 md:right-6 px-5 py-3.5 rounded-2xl font-black text-sm text-white shadow-2xl z-[9999] toast-enter ${
                type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500'
            }`;
            toast.innerHTML =
                `<span class="flex items-center gap-2"><i class="fa-solid fa-${
                type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'
            }"></i> ${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('toast-exit');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function toggleDarkMode() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark', isDarkMode);
            localStorage.setItem('darkMode', isDarkMode);
            const darkBtn = document.querySelector('.fa-moon, .fa-sun');
            if (darkBtn) {
                darkBtn.className = `fa-solid fa-${isDarkMode ? 'sun' : 'moon'}`;
            }
        }

        // ==================== DATA LOADING ====================
        async function loadData() {
            triggerLoader(1500);
            try {
                const [{ data: prodData }, { data: orderData }] = await Promise.all([
                    _supabase.from('products').select('*'),
                    _supabase.from('orders').select('*').order('created_at', { ascending: false })
                ]);

                if (prodData) currentData.products = prodData;
                if (orderData) {
                    currentData.orders = orderData;
                    renderAnalytics();
                }

                showToast('Analytics loaded successfully', 'success');
            } catch (error) {
                console.error('Error loading data:', error);
                showToast('Failed to load analytics data', 'error');
            }
            triggerLoader(500);
        }

        // ==================== ANALYTICS RENDERING ====================
        function setTimeFilter(filter, btn) {
            currentTimeFilter = filter;
            const buttons = btn.parentElement.querySelectorAll('button');
            buttons.forEach(b => {
                b.classList.remove('bg-white', 'shadow-sm');
                b.classList.add('text-gray-500');
            });
            btn.classList.add('bg-white', 'shadow-sm');
            btn.classList.remove('text-gray-500');
            renderAnalytics();
        }

        function renderAnalytics() {
            const orders = currentData.orders;
            if (!orders.length) {
                showToast('No order data available', 'info');
                return;
            }

            // Filter orders based on time
            const now = new Date();
            let filteredOrders = orders;
            if (currentTimeFilter === '7d') {
                const sevenDaysAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
                filteredOrders = orders.filter(o => new Date(o.created_at) >= sevenDaysAgo);
            } else if (currentTimeFilter === '30d') {
                const thirtyDaysAgo = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);
                filteredOrders = orders.filter(o => new Date(o.created_at) >= thirtyDaysAgo);
            }

            // Calculate metrics
            let totalRevenue = 0;
            let pendingCount = 0;
            const categoryMap = {};
            const dailyRevenue = {};

            const sortedOrders = [...filteredOrders].sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

            sortedOrders.forEach(o => {
                const rev = parseFloat(o.member_info?.total?.toString().replace('৳', '')) || 0;
                totalRevenue += rev;
                if (o.status !== 'completed') pendingCount++;

                const dateKey = new Date(o.created_at).toLocaleDateString('en-GB', {
                    day: '2-digit',
                    month: 'short'
                });
                dailyRevenue[dateKey] = (dailyRevenue[dateKey] || 0) + rev;

                // Category distribution
                (o.member_info?.items || []).forEach(item => {
                    const prod = currentData.products.find(p => p.title === item.title);
                    const cat = prod ? prod.category : "Uncategorized";
                    categoryMap[cat] = (categoryMap[cat] || 0) + 1;
                });
            });

            const aov = totalRevenue / filteredOrders.length;

            // Update stats
            document.getElementById('stat-revenue').innerText = `৳ ${totalRevenue.toLocaleString()}`;
            document.getElementById('stat-orders').innerText = filteredOrders.length;
            document.getElementById('stat-pending').innerText = pendingCount;
            document.getElementById('stat-aov').innerText = `৳ ${Math.round(aov).toLocaleString()}`;

            // Calculate trends (mock for demo)
            const revenueChange = ((totalRevenue / (filteredOrders.length || 1)) * 0.12).toFixed(1);
            document.getElementById('trend-revenue').innerHTML = `+${revenueChange}% ↑`;
            document.getElementById('trend-orders').innerHTML = `+8.2% ↑`;
            document.getElementById('trend-pending').innerHTML = `-3.1% ↓`;
            document.getElementById('trend-aov').innerHTML = `+5.7% ↑`;

            // Sparklines
            const sparkData = Object.values(dailyRevenue).slice(-7);
            ['revenue', 'orders', 'pending', 'aov'].forEach((key, index) => {
                const multiplier = [1, 0.7, 0.3, 0.6][index];
                const data = sparkData.length ? sparkData.map(v => v * multiplier) : [0];
                const color = ['#0071e3', '#ff9f0a', '#af52de', '#34c759'][index];
                drawSparkline(`spark-${key}`, data, color);
            });

            // Revenue Chart
            const chartLabels = Object.keys(dailyRevenue).slice(-10);
            const chartData = chartLabels.map(l => dailyRevenue[l]);
            const revCtx = document.getElementById('revenueChart').getContext('2d');
            if (revChartInstance) revChartInstance.destroy();

            const gradient = revCtx.createLinearGradient(0, 0, 0, 300);
            gradient.addColorStop(0, 'rgba(0, 113, 227, 0.25)');
            gradient.addColorStop(1, 'rgba(0, 113, 227, 0)');

            revChartInstance = new Chart(revCtx, {
                type: 'line',
                data: {
                    labels: chartLabels,
                    datasets: [{
                        data: chartData,
                        borderColor: '#0071e3',
                        borderWidth: 3,
                        backgroundColor: gradient,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 3,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#f0f0f0' } },
                        x: { grid: { display: false } }
                    }
                }
            });

            // Category Chart
            const catLabels = Object.keys(categoryMap);
            const catValues = Object.values(categoryMap);
            const catCtx = document.getElementById('categoryChart').getContext('2d');
            if (catChartInstance) catChartInstance.destroy();

            const colors = ['#0071e3', '#ff9f0a', '#34c759', '#af52de', '#ff3b30', '#5856d6'];
            catChartInstance = new Chart(catCtx, {
                type: 'doughnut',
                data: {
                    labels: catLabels,
                    datasets: [{ data: catValues, backgroundColor: colors, borderWidth: 0 }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '70%',
                    plugins: { legend: { display: false } }
                }
            });

            // Category Legend
            document.getElementById('category-legend').innerHTML = catLabels.map((l, i) =>
                `<div class="flex justify-between text-[10px] font-black uppercase">
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full" style="background:${colors[i % 6]}"></span>${l}
                    </div>
                    <span>${catValues[i]}</span>
                </div>`
            ).join('');
        }

        function drawSparkline(canvasId, data, color) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = 40;

            if (sparkInstances[canvasId]) sparkInstances[canvasId].destroy();

            sparkInstances[canvasId] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map((_, i) => i),
                    datasets: [{
                        data,
                        borderColor: color,
                        borderWidth: 2,
                        fill: true,
                        backgroundColor: color + '15',
                        tension: 0.5,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: { enabled: false }
                    },
                    scales: {
                        x: { display: false },
                        y: { display: false }
                    }
                }
            });
        }

        // ==================== WEEKLY REPORT PDF ====================
        async function downloadWeeklyReport() {
            triggerLoader(3000);
            const orders = currentData.orders;
            const now = new Date();
            const oneWeekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
            const weeklyOrders = orders.filter(o => new Date(o.created_at) >= oneWeekAgo);
            const weeklyRevenue = weeklyOrders.reduce((acc, o) => acc + (parseFloat(o.member_info?.total?.toString().replace('৳', '') || 0)), 0);

            const div = document.createElement('div');
            div.style.padding = '40px 50px';
            div.style.fontFamily = 'Inter, system-ui, sans-serif';
            div.style.color = '#1e293b';
            div.style.maxWidth = '800px';
            div.style.margin = '0 auto';
            div.style.background = 'white';
            div.innerHTML = `
                <div style="display:flex;justify-content:space-between;align-items:center;border-bottom:4px solid #0071e3;padding-bottom:25px;margin-bottom:35px">
                    <div style="display:flex;align-items:center;gap:15px">
                        <img src="${LOGO_URL}" style="width:50px;height:50px;border-radius:12px;object-fit:cover">
                        <div>
                            <h1 style="font-size:28px;font-weight:900;margin:0;color:#0f172a">JAYENWARE</h1>
                            <p style="font-size:10px;color:#94a3b8;text-transform:uppercase;font-weight:800;letter-spacing:0.1em;margin:3px 0">Weekly Business Report</p>
                        </div>
                    </div>
                    <div style="text-align:right">
                        <p style="font-size:12px;font-weight:800;color:#0071e3;margin:0">${now.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' })}</p>
                    </div>
                </div>
                <div style="background:linear-gradient(135deg,#eff6ff,#e0f2fe);padding:25px;border-radius:20px;margin-bottom:30px">
                    <h2 style="font-size:16px;font-weight:900;text-transform:uppercase;letter-spacing:0.05em;color:#1e40af;margin:0 0 15px 0">Executive Summary</h2>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px">
                        <div style="background:white;padding:15px;border-radius:12px">
                            <p style="font-size:9px;font-weight:800;color:#64748b;text-transform:uppercase;margin:0">Total Revenue</p>
                            <p style="font-size:22px;font-weight:900;color:#0f172a;margin:5px 0">৳ ${weeklyRevenue.toLocaleString()}</p>
                        </div>
                        <div style="background:white;padding:15px;border-radius:12px">
                            <p style="font-size:9px;font-weight:800;color:#64748b;text-transform:uppercase;margin:0">Total Orders</p>
                            <p style="font-size:22px;font-weight:900;color:#0f172a;margin:5px 0">${weeklyOrders.length}</p>
                        </div>
                    </div>
                </div>
                <div style="border-top:2px solid #f1f5f9;padding-top:20px;text-align:center">
                    <p style="font-size:9px;color:#94a3b8;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;margin:0">Generated by JAYENWARE Admin • Core by BINZEO</p>
                </div>`;

            const opt = {
                margin: [10, 10, 10, 10],
                filename: `JAYENWARE_Weekly_Report_${now.toISOString().split('T')[0]}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, letterRendering: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            await html2pdf().set(opt).from(div).save();
            showToast('Weekly report downloaded successfully! 📊', 'success');
            triggerLoader(500);
        }

        // ==================== INITIALIZATION ====================
        window.onload = () => {
            // Check dark mode preference
            if (localStorage.getItem('darkMode') === 'true') {
                isDarkMode = true;
                document.body.classList.add('dark');
            }
            loadData();
        };

        // Handle window resize for charts
        window.addEventListener('resize', () => {
            if (revChartInstance) revChartInstance.resize();
            if (catChartInstance) catChartInstance.resize();
        });
    </script>
</body>
</html>
