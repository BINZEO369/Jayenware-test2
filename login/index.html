<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login | JAYENWARE Admin</title>
    <meta name="theme-color" content="#0071e3">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="JAYENWARE">
    <link rel="icon" type="image/png" href="https://ozuwazkqyrxiwwfjceth.supabase.co/storage/v1/object/public/images/Beige%20Black%20Minimal%20Simple%20Modern%20Handwritten%20Graffiti%20Typographic%20Arts%20and_20251212_154142_0000.png">
    <link rel="apple-touch-icon" href="https://ozuwazkqyrxiwwfjceth.supabase.co/storage/v1/object/public/images/Beige%20Black%20Minimal%20Simple%20Modern%20Handwritten%20Graffiti%20Typographic%20Arts%20and_20251212_154142_0000.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/api-config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.5);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 60px rgba(0, 0, 0, 0.15);
            --radius-xl: 1.5rem;
            --radius-2xl: 2rem;
            --radius-3xl: 2.5rem;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Animated background */
        .bg-animated {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animated .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 12s ease-in-out infinite;
        }

        .bg-animated .orb:nth-child(1) {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #0071e3, #5856d6);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .bg-animated .orb:nth-child(2) {
            width: 350px;
            height: 350px;
            background: linear-gradient(135deg, #ff6b6b, #ff9f0a);
            bottom: -100px;
            right: -100px;
            animation-delay: -4s;
        }

        .bg-animated .orb:nth-child(3) {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #34c759, #0071e3);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -8s;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(30px, -30px) scale(1.05);
            }
            50% {
                transform: translate(-20px, 20px) scale(0.95);
            }
            75% {
                transform: translate(10px, 40px) scale(1.02);
            }
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-xl);
        }

        .btn-action {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
        }

        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        .btn-action:active {
            transform: scale(0.96);
        }

        .input-field {
            transition: all 0.3s ease;
        }

        .input-field:focus {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(0, 113, 227, 0.15);
        }

        /* Pulse animation for logo */
        @keyframes logo-pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(0, 113, 227, 0.4);
            }
            50% {
                box-shadow: 0 0 0 15px rgba(0, 113, 227, 0);
            }
        }

        .logo-pulse {
            animation: logo-pulse 3s infinite;
        }

        /* Shake animation for error */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
            20%, 40%, 60%, 80% { transform: translateX(4px); }
        }

        .shake {
            animation: shake 0.6s ease-in-out;
        }

        /* Fade in */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
        }

        .fade-in-up:nth-child(2) {
            animation-delay: 0.1s;
        }

        .fade-in-up:nth-child(3) {
            animation-delay: 0.2s;
        }

        .fade-in-up:nth-child(4) {
            animation-delay: 0.3s;
        }

        /* Password visibility toggle */
        .password-toggle {
            cursor: pointer;
            transition: color 0.2s;
        }

        .password-toggle:hover {
            color: #0071e3;
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                margin: 16px;
                padding: 32px 24px;
                border-radius: 2rem;
            }
        }

        @media (min-width: 481px) {
            .login-card {
                max-width: 440px;
                width: 100%;
                padding: 48px 40px;
                border-radius: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animated">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>

    <!-- Login Card -->
    <div class="login-card glass-card relative z-10 w-full fade-in-up">
        <!-- Logo Section -->
        <div class="text-center mb-8">
            <div class="inline-block logo-pulse rounded-2xl mb-6">
                <img src="https://ozuwazkqyrxiwwfjceth.supabase.co/storage/v1/object/public/images/Beige%20Black%20Minimal%20Simple%20Modern%20Handwritten%20Graffiti%20Typographic%20Arts%20and_20251212_154142_0000.png" 
                     class="w-20 h-20 rounded-2xl object-cover shadow-lg" 
                     alt="JAYENWARE Logo"
                     onerror="this.style.display='none'">
            </div>
            <h1 class="text-2xl font-black uppercase tracking-tighter mb-1">Admin Portal</h1>
            <p class="text-gray-400 text-sm font-medium">Secure access for JAYENWARE Management</p>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="space-y-5" autocomplete="off">
            <!-- Email Field -->
            <div>
                <label for="email" class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">
                    <i class="fa-solid fa-envelope mr-1"></i> Admin Email
                </label>
                <div class="relative">
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="admin@jayenware.com" 
                        required 
                        autocomplete="off"
                        class="input-field w-full p-4 pr-12 rounded-2xl bg-white border border-gray-200 outline-none text-sm font-bold focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                    >
                    <i class="fa-solid fa-user-tie absolute right-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                </div>
            </div>

            <!-- Password Field -->
            <div>
                <label for="password" class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">
                    <i class="fa-solid fa-lock mr-1"></i> Password
                </label>
                <div class="relative">
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="••••••••" 
                        required 
                        autocomplete="off"
                        class="input-field w-full p-4 pr-12 rounded-2xl bg-white border border-gray-200 outline-none text-sm font-bold focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                    >
                    <i class="fa-solid fa-eye password-toggle absolute right-4 top-1/2 -translate-y-1/2 text-gray-400" 
                       id="toggle-password" 
                       onclick="togglePasswordVisibility()"
                       title="Show/Hide Password"></i>
                </div>
            </div>

            <!-- Remember Me -->
            <div class="flex items-center justify-between">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="remember-me" class="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                    <span class="text-[10px] font-bold text-gray-500 uppercase">Remember Me</span>
                </label>
                <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest">BINZEO</span>
            </div>

            <!-- Error Message -->
            <div id="error-message" class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-2xl text-xs font-bold flex items-center gap-2">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span id="error-text"></span>
            </div>

            <!-- Submit Button -->
            <button 
                type="submit" 
                id="login-button"
                class="btn-action w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-sm uppercase tracking-wider shadow-lg hover:bg-slate-800 transition flex items-center justify-center gap-2"
            >
                <i class="fa-solid fa-right-to-bracket"></i>
                <span id="button-text">Login to Dashboard</span>
                <span id="button-spinner" class="hidden spinner"></span>
            </button>
        </form>

        <!-- Footer -->
        <div class="mt-8 pt-6 border-t border-gray-100 text-center">
            <p class="text-[9px] font-black text-gray-300 uppercase tracking-widest mb-1">Architected & Developed by</p>
            <p class="text-sm font-black text-blue-600 tracking-tight">BINZEO</p>
            <p class="text-[8px] text-gray-400 mt-2">© 2024 JAYENWARE. All rights reserved.</p>
        </div>
    </div>

    <script>
        // ==================== CONFIGURATION ====================


        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ==================== UTILITY FUNCTIONS ====================
        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            errorText.textContent = message;
            errorDiv.classList.remove('hidden');
            errorDiv.classList.add('shake');
            setTimeout(() => errorDiv.classList.remove('shake'), 600);
        }

        function hideError() {
            document.getElementById('error-message').classList.add('hidden');
        }

        function setLoading(isLoading) {
            const button = document.getElementById('login-button');
            const buttonText = document.getElementById('button-text');
            const buttonSpinner = document.getElementById('button-spinner');

            if (isLoading) {
                button.disabled = true;
                button.classList.add('opacity-75');
                buttonText.textContent = 'Authenticating...';
                buttonSpinner.classList.remove('hidden');
            } else {
                button.disabled = false;
                button.classList.remove('opacity-75');
                buttonText.textContent = 'Login to Dashboard';
                buttonSpinner.classList.add('hidden');
            }
        }

        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggle-password');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        // ==================== REMEMBER ME ====================
        function loadRememberedEmail() {
            const rememberedEmail = localStorage.getItem('jayenware_remembered_email');
            if (rememberedEmail) {
                document.getElementById('email').value = rememberedEmail;
                document.getElementById('remember-me').checked = true;
            }
        }

        function saveRememberedEmail(email) {
            const rememberMe = document.getElementById('remember-me').checked;
            if (rememberMe) {
                localStorage.setItem('jayenware_remembered_email', email);
            } else {
                localStorage.removeItem('jayenware_remembered_email');
            }
        }

        // ==================== SESSION CHECK (Already Logged In?) ====================
        async function checkExistingSession() {
            const { data: { session } } = await _supabase.auth.getSession();
            
            if (session && session.user.email === ADMIN_EMAIL) {
                // Already logged in as admin, redirect to home
                window.location.href = HOME_URL;
                return true;
            }
            return false;
        }

        // ==================== LOGIN HANDLER ====================
        async function handleLogin(event) {
            event.preventDefault();
            hideError();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // Basic validation
            if (!email) {
                showError('Please enter your email address');
                document.getElementById('email').focus();
                return;
            }

            if (!password) {
                showError('Please enter your password');
                document.getElementById('password').focus();
                return;
            }

            // Email format validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showError('Please enter a valid email address');
                document.getElementById('email').focus();
                return;
            }

            // Admin email check
            if (email !== ADMIN_EMAIL) {
                showError('Unauthorized! This portal is for JAYENWARE Admin only. Access restricted by BINZEO system.');
                return;
            }

            setLoading(true);

            try {
                const { data, error } = await _supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    // Handle specific Supabase errors
                    switch (error.message) {
                        case 'Invalid login credentials':
                            showError('Incorrect password. Please try again.');
                            break;
                        case 'Email not confirmed':
                            showError('Email not verified. Please check your inbox.');
                            break;
                        default:
                            showError(error.message);
                    }
                    setLoading(false);
                    return;
                }

                if (data && data.session) {
                    // Save remembered email
                    saveRememberedEmail(email);
                    
                    // Success! Redirect to home
                    window.location.href = HOME_URL;
                } else {
                    showError('Login failed. Please try again.');
                    setLoading(false);
                }

            } catch (error) {
                console.error('Login error:', error);
                showError('Network error. Please check your connection and try again.');
                setLoading(false);
            }
        }

        // ==================== EVENT LISTENERS ====================
        document.getElementById('login-form').addEventListener('submit', handleLogin);

        // Enter key to submit
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && document.activeElement.tagName !== 'BUTTON') {
                e.preventDefault();
                handleLogin(e);
            }
        });

        // Clear error on input
        document.getElementById('email').addEventListener('input', hideError);
        document.getElementById('password').addEventListener('input', hideError);

        // ==================== INITIALIZATION ====================
        async function init() {
            // Check if already logged in
            const alreadyLoggedIn = await checkExistingSession();
            if (alreadyLoggedIn) return;

            // Load remembered email
            loadRememberedEmail();

            // Focus on email if empty, otherwise password
            const emailInput = document.getElementById('email');
            if (emailInput.value) {
                document.getElementById('password').focus();
            } else {
                emailInput.focus();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
